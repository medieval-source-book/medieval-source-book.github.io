---
layout: default
---
<div class="row" id="main">
  {% if sidebar == "left" %}
  <div class="large-4 columns">
    {% include "_text-metadata.html" %}
  </div><!-- /.large-4.columns -->
  <div class="large-8 columns">
  {% else %}
  <div class="large-12 columns">
  {% endif %}
    <article itemscope itemtype="http://schema.org/Article">
      <header class="row">
        <div itemprop="name" class="large-12 columns">
          <h1 id="pagetitle" class="landing">{{ title | default: page.title }}</h1>
        </div>
      </header>

      <div itemprop="articleSection">
        {% if pdf %}
        <a href="{{ pdf }}" download style="display: inline-block; padding: 8px 16px; margin-bottom: 1em; background-color: #BB0000; color: white; border: none; border-radius: 4px; text-decoration: none;">Download formatted PDF</a>
        {% endif %}
        
        {% include "_textimage.html" %}

        {{ content | safe }}
      </div>
    </article>
  </div><!-- /.large-8 or .large-12.columns -->
</div><!-- /.row -->
